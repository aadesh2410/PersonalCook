---
name: Build and Deploy to Firebase

'on':
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK
        run: >
          eas build --platform android --profile production
          --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Wait for build completion
        id: wait-build
        run: |
          echo "Waiting for EAS build to complete..."
          # Get the latest build ID for Android
          BUILD_ID=$(eas build:list --platform android --limit 1 \
            --json --non-interactive | jq -r '.[0].id')
          echo "Build ID: $BUILD_ID"

          # Wait for build to complete (max 30 minutes)
          TIMEOUT=1800
          ELAPSED=0
          INTERVAL=30

          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(eas build:view $BUILD_ID --json \
              --non-interactive | jq -r '.status')
            echo "Build status: $STATUS (${ELAPSED}s elapsed)"

            if [ "$STATUS" = "finished" ]; then
              echo "Build completed successfully!"
              BUILD_URL=$(eas build:view $BUILD_ID --json \
                --non-interactive | jq -r '.artifacts.buildUrl')
              echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT
              exit 0
            elif [ "$STATUS" = "errored" ] \
              || [ "$STATUS" = "canceled" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "Build timeout after ${TIMEOUT}s"
          exit 1
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download APK
        run: |
          curl -L -o PersonalCook.apk \
            "${{ steps.wait-build.outputs.build_url }}"
          ls -lh PersonalCook.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PersonalCook-APK
          path: PersonalCook.apk
          retention-days: 30

  deploy-firebase:
    name: Deploy to Firebase App Distribution
    needs: build-android
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: PersonalCook-APK

      - name: Deploy to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1.7.1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: >
            ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: PersonalCook.apk
          releaseNotes: |
            Automated build from commit: ${{ github.sha }}

            Changes in this release:
            ${{ github.event.head_commit.message }}

      - name: Deployment success
        run: |
          echo "✅ APK deployed to Firebase App Distribution!"
          echo "Testers will receive a notification to download."
